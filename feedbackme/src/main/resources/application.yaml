spring:
  application:
    name: feedbackme
  config:
    import: optional:classpath:application-secret.yaml
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update # 개발 초기 단계이므로 엔티티 변경 시 테이블을 자동으로 수정하도록 설정
    show-sql: true     # 실행되는 SQL을 콘솔에 출력
    properties:
      hibernate:
        format_sql: true # SQL을 보기 좋게 포맷팅
        default_batch_fetch_size: 100 # 추후 성능 최적화를 위한 옵션

gemini:
  api-key: ${GEMINI_API_KEY}

openai:
  api-key: ${OPENAI_API_KEY:}
  models:
    job-analysis: ${OPENAI_JOB_ANALYSIS_MODEL:gpt-5.6-luna}
    candidate-analysis: ${OPENAI_CANDIDATE_ANALYSIS_MODEL:gpt-5.6-luna}
    matching: ${OPENAI_MATCHING_MODEL:gpt-5.6-terra}
    report: ${OPENAI_REPORT_MODEL:gpt-5.6-terra}
    verification: ${OPENAI_VERIFICATION_MODEL:gpt-5.6-sol}

payments:
  toss:
    secret-key: ${TOSS_SECRET_KEY:}
  dev-mode: ${PAYMENT_DEV_MODE:true}

feedback:
  analysis:
    provider: openai
    prompt-version: v1.0.0
    cache-key-version: openai-legacy-v1
  queue:
    poll-delay-ms: 1000
  cache:
    result-ttl-seconds: 604800

management:
  endpoints:
    web:
      exposure:
        include: "prometheus"
  metrics:
    tags:
      application: "${spring.application.name:feedbackme}"
