<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FeedbackMe - 자소서 피드백</title>
    <style>
        body {
            max-width: 820px;
            margin: 0 auto;
            padding: 28px 18px;
            color: #222;
            font-family: Arial, "Noto Sans KR", sans-serif;
            background: #f7f8fa;
        }

        h1 {
            margin-bottom: 8px;
            text-align: center;
        }

        .description {
            margin-bottom: 28px;
            color: #666;
            text-align: center;
        }

        .panel {
            padding: 24px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-weight: 700;
        }

        input[type="text"],
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 14px;
        }

        textarea {
            min-height: 220px;
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 12px;
            border: 0;
            border-radius: 6px;
            color: #fff;
            background: #2563eb;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .muted {
            color: #777;
            font-size: 13px;
            font-weight: 400;
        }

        #loading,
        #result {
            display: none;
            margin-top: 20px;
        }

        #status {
            text-align: center;
            color: #555;
        }

        #result {
            white-space: pre-wrap;
            line-height: 1.6;
        }

        .loader {
            width: 32px;
            height: 32px;
            margin: 18px auto;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #2563eb;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<h1>FeedbackMe</h1>
<p class="description">채용공고와 자기소개서를 입력하면 AI가 비동기로 피드백을 생성합니다.</p>

<div id="form-container" class="panel">
    <div class="form-group">
        <label for="url">채용공고 URL</label>
        <input type="text" id="url" placeholder="https://www.saramin.co.kr/...">
    </div>
    <div class="form-group">
        <label for="coverLetter">자기소개서</label>
        <textarea id="coverLetter" placeholder="자기소개서 내용을 입력하세요."></textarea>
    </div>
    <div class="form-group">
        <label for="file">첨부 파일 <span class="muted">선택, PDF 또는 DOCX</span></label>
        <input type="file" id="file" accept=".pdf,.docx">
    </div>
    <button type="button" onclick="submitFeedback()">피드백 받기</button>
</div>

<div id="loading" class="panel">
    <div class="loader"></div>
    <p id="status">요청을 접수하는 중입니다.</p>
</div>

<div id="result" class="panel"></div>

<script>
    let pollInterval = null;

    async function submitFeedback() {
        const url = document.getElementById('url').value.trim();
        const coverLetter = document.getElementById('coverLetter').value.trim();
        const file = document.getElementById('file').files[0];

        if (!url || !coverLetter) {
            alert('채용공고 URL과 자기소개서를 모두 입력해 주세요.');
            return;
        }

        showLoading('요청을 접수하는 중입니다.');

        const formData = new FormData();
        formData.append('url', url);
        formData.append('coverLetter', coverLetter);
        if (file) {
            formData.append('file', file);
        }

        try {
            const response = await fetch('/api/feedback', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (!response.ok) {
                throw new Error(data.error || data.message || '요청 접수 실패');
            }

            startPolling(data.historyId);
        } catch (error) {
            alert('오류가 발생했습니다: ' + error.message);
            resetUI();
        }
    }

    function startPolling(historyId) {
        setStatus('대기열에 등록되었습니다. AI 분석을 기다리는 중입니다.');

        pollInterval = setInterval(async () => {
            try {
                const response = await fetch('/api/feedback/status/' + historyId);
                if (!response.ok) {
                    throw new Error('상태 확인 실패');
                }

                const data = await response.json();
                if (data.status === 'PENDING') {
                    setStatus('대기열에서 순서를 기다리는 중입니다.');
                    return;
                }

                if (data.status === 'PROCESSING') {
                    setStatus('AI가 피드백을 생성하는 중입니다.');
                    return;
                }

                if (data.status === 'COMPLETED') {
                    clearInterval(pollInterval);
                    document.getElementById('loading').style.display = 'none';
                    const result = document.getElementById('result');
                    result.style.display = 'block';
                    result.innerText = data.result;
                    return;
                }

                if (data.status === 'FAILED') {
                    clearInterval(pollInterval);
                    alert('피드백 생성 중 오류가 발생했습니다.');
                    resetUI();
                }
            } catch (error) {
                console.error(error);
                setStatus('상태 확인 중 문제가 발생했습니다. 잠시 후 다시 시도합니다.');
            }
        }, 1500);
    }

    function showLoading(message) {
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('result').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        setStatus(message);
    }

    function setStatus(message) {
        document.getElementById('status').innerText = message;
    }

    function resetUI() {
        if (pollInterval) {
            clearInterval(pollInterval);
        }
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
