<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>FeedbackMe - 자소서 피드백</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; }
        h1 { color: #333; text-align: center; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-weight: bold; margin-bottom: 6px; }
        input[type="text"], textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 200px; resize: vertical; }
        button { width: 100%; padding: 12px; background-color: #4CAF50; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #result { margin-top: 30px; padding: 20px; background: #f9f9f9; border-radius: 6px; border: 1px solid #ddd; white-space: pre-wrap; display: none; }
        #loading { text-align: center; display: none; color: #888; margin-top: 20px; }

        /* 뱅글뱅글 도는 로딩 애니메이션 추가 */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #4CAF50; border-radius: 50%; width: 30px; height: 30px; animation: spin 1.5s linear infinite; margin: 15px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
<h1>📝 FeedbackMe</h1>
<p style="text-align:center; color:#666;">채용공고 URL과 자기소개서를 입력하면 AI가 피드백을 드려요</p>

<div id="form-container">
    <div class="form-group">
        <label>채용공고 URL</label>
        <input type="text" id="url" placeholder="https://www.saramin.co.kr/..."/>
    </div>
    <div class="form-group">
        <label>자기소개서</label>
        <textarea id="coverLetter" placeholder="자기소개서 내용을 입력하세요..."></textarea>
    </div>
    <div class="form-group">
        <label>이력서 / 포트폴리오 첨부 <span style="color:#888; font-weight:normal;">(선택, PDF 또는 DOCX)</span></label>
        <input type="file" id="file" accept=".pdf,.docx"/>
    </div>
    <button onclick="submitFeedback()">피드백 받기</button>
</div>

<div id="loading">
    <div class="loader"></div>
    <p>⏳ AI가 분석 중입니다. 대기 큐에서 처리되는 동안 잠시만 기다려주세요...</p>
</div>

<div id="result"></div>

<script>
    async function submitFeedback() {
        const url = document.getElementById('url').value;
        const coverLetter = document.getElementById('coverLetter').value;
        const file = document.getElementById('file').files[0];

        if (!url || !coverLetter) {
            alert('URL과 자기소개서를 모두 입력해주세요.');
            return;
        }

        // UI 전환: 입력창 숨기고 로딩 띄우기
        document.getElementById('form-container').style.display = 'none';
        document.getElementById('loading').style.display = 'block';
        document.getElementById('result').style.display = 'none';

        const formData = new FormData();
        formData.append('url', url);
        formData.append('coverLetter', coverLetter);
        if (file) formData.append('file', file);

        try {
            // 1. 백엔드에 접수 (큐에 적재되고 즉시 ID 응답이 옴)
            const response = await fetch('/api/feedback', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) throw new Error('서버 접수 실패');

            const data = await response.json(); // 반환된 JSON 파싱 ({ "historyId": 123, ... })
            const historyId = data.historyId;

            // 2. 주기적으로 상태를 물어보는 폴링 시작
            startPolling(historyId);

        } catch (error) {
            alert('오류가 발생했습니다: ' + error.message);
            resetUI();
        }
    }

    // 1.5초마다 백엔드 상태를 체크하는 함수
    function startPolling(historyId) {
        const pollInterval = setInterval(async () => {
            try {
                const response = await fetch('/api/feedback/status/' + historyId);
                if (!response.ok) throw new Error('상태 확인 실패');

                const data = await response.json();
                console.log("현재 진행 상태:", data.status);

                if (data.status === 'COMPLETED') {
                    clearInterval(pollInterval); // 대기 종료

                    // 결과 노출
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('result').innerText = data.result;

                } else if (data.status === 'FAILED') {
                    clearInterval(pollInterval);
                    alert("피드백 생성 중 오류가 발생했습니다.");
                    resetUI();
                }

            } catch (error) {
                console.error("상태 체크 에러:", error);
            }
        }, 1500); // 1.5초 간격
    }

    // 에러 발생 시 UI를 다시 원래대로 돌리는 함수
    function resetUI() {
        document.getElementById('form-container').style.display = 'block';
        document.getElementById('loading').style.display = 'none';
    }
</script>
</body>
</html>
