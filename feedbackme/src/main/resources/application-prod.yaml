spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: false

gemini:
  api-key: ${GEMINI_API_KEY}

openai:
  api-key: ${OPENAI_API_KEY:}
  models:
    job-analysis: ${OPENAI_JOB_ANALYSIS_MODEL:gpt-5.6-luna}
    candidate-analysis: ${OPENAI_CANDIDATE_ANALYSIS_MODEL:gpt-5.6-luna}
    matching: ${OPENAI_MATCHING_MODEL:gpt-5.6-terra}
    report: ${OPENAI_REPORT_MODEL:gpt-5.6-terra}
    verification: ${OPENAI_VERIFICATION_MODEL:gpt-5.6-sol}

payments:
  toss:
    secret-key: ${TOSS_SECRET_KEY:}
  dev-mode: ${PAYMENT_DEV_MODE:false}

feedback:
  analysis:
    provider: openai
    prompt-version: ${FEEDBACK_PROMPT_VERSION:v1.0.0}
    cache-key-version: ${FEEDBACK_CACHE_KEY_VERSION:openai-legacy-v1}
  queue:
    poll-delay-ms: ${FEEDBACK_QUEUE_POLL_DELAY_MS:1000}
  cache:
    result-ttl-seconds: ${FEEDBACK_RESULT_CACHE_TTL_SECONDS:604800}

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
