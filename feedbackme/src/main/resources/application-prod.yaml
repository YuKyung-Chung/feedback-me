spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=Asia/Seoul&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: false

gemini:
  api-key: ${GEMINI_API_KEY}

payments:
  toss:
    secret-key: ${TOSS_SECRET_KEY:}
  dev-mode: ${PAYMENT_DEV_MODE:false}

feedback:
  queue:
    poll-delay-ms: ${FEEDBACK_QUEUE_POLL_DELAY_MS:1000}
  cache:
    result-ttl-seconds: ${FEEDBACK_RESULT_CACHE_TTL_SECONDS:604800}

management:
  endpoints:
    web:
      exposure:
        include: "health,prometheus"
  endpoint:
    health:
      probes:
        enabled: true
