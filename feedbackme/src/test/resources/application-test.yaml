spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:feedbackme-test;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: localhost
      port: 6379

gemini:
  api-key: test-api-key

openai:
  api-key: test-api-key
  models:
    legacy-feedback: gpt-5.6-terra

feedback:
  analysis:
    provider: openai
    prompt-version: v1.0.0
    cache-key-version: openai-legacy-v1

management:
  endpoints:
    web:
      exposure:
        include: "health"
