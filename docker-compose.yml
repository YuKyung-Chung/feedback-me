version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: feedbackme-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: feedbackme
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    # 컨테이너 닫혀도 데이터 사라지지 않도록 로컬 디렉토리와 동기화
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci