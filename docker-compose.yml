services:
  app:
    build:
      context: ./feedbackme
      dockerfile: Dockerfile
    container_name: feedbackme-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      MYSQL_HOST: db
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build:
      context: ./feedbackme/frontend
      dockerfile: Dockerfile
    container_name: feedbackme-frontend
    environment:
      VITE_API_PROXY: http://app:8080
    ports:
      - "5173:5173"
    depends_on:
      - app

  db:
    image: mysql:8.0
    container_name: feedbackme-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # 컨테이너 닫혀도 데이터 사라지지 않도록 로컬 디렉토리와 동기화
    volumes:
      - ./docker/mysql/data:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
  # Redis 추가
  redis:
    image: redis:alpine
    container_name: feedbackme-redis
    ports:
      - "6379:6379"

  # Prometheus 추가
  prometheus:
    image: prom/prometheus:latest
    container_name: feedbackme-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml

  # Grafana 추가
  grafana:
    image: grafana/grafana:latest
    container_name: feedbackme-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - ./docker/grafana/data:/var/lib/grafana
